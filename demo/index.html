.container{max-width:1200px;margin:0 auto;padding:1rem}

.filters{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1rem}
.filter-group{display:flex;gap:.3rem;flex-wrap:wrap;align-items:center}
.filter-group label{color:#8b949e;font-size:.8rem;margin-right:.3rem}

.fbtn.active{background:#238636;border-color:#238636;color:#fff}
.count{color:#8b949e;font-size:.85rem;margin-bottom:.8rem}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:.8rem}
.card{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:1rem;cursor:pointer;transition:border-color .2s}
.card:hover{border-color:#58a6ff}
.card-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.5rem}
.card-name{font-size:1rem;font-weight:600;color:#58a6ff}
.card-speed{font-size:.75rem;padding:.2rem .5rem;background:#1f6feb22;border:1px solid #1f6feb44;border-radius:4px;color:#58a6ff}
.card-meta{display:flex;gap:.8rem;flex-wrap:wrap;font-size:.8rem;color:#8b949e}
.card-meta span{display:flex;gap:.2rem}
.card-detail{display:none;margin-top:.8rem;padding-top:.8rem;border-top:1px solid #21262d;font-size:.85rem}
.card-detail.open{display:block}
.card-detail p{margin:.3rem 0;color:#8b949e}
.card-detail strong{color:#c9d1d9}
.vendor-tags{display:flex;gap:.3rem;flex-wrap:wrap;margin-top:.5rem}
.vtag{font-size:.7rem;padding:.15rem .4rem;background:#21262d;border-radius:3px;color:#8b949e}
.std-table,.comp-table{width:100%;border-collapse:collapse;font-size:.8rem}
.std-table th,.comp-table th{text-align:left;padding:.5rem;background:#161b22;border-bottom:1px solid #30363d;color:#58a6ff;position:sticky;top:0}
.std-table td,.comp-table td{padding:.5rem;border-bottom:1px solid #21262d;color:#c9d1d9}
.std-table tr:hover td,.comp-table tr:hover td{background:#161b22}
.footer{text-align:center;padding:2rem;border-top:1px solid #21262d;margin-top:2rem;color:#8b949e;font-size:.85rem}
.footer a{color:#58a6ff;text-decoration:none}
@media(max-width:600px){.grid{grid-template-columns:1fr}.header h1{font-size:1.3rem}}
.hidden{display:none}
</style>

headquarters":"Suzhou, China","marketPosition":"Top optical transceiver manufacturer by revenue. Primary supplier to NVIDIA and major hyperscalers. Dominates 800G market.","formFactorsOffered":["SFP28","QSFP28","QSFP56","QSFP-DD","OSFP","OSFP-XD"],"speedTiersOffered":["25G","100G","200G","400G","800G","1.6T"],"strengths":["Primary supplier to NVIDIA","Massive manufacturing scale","Silicon photonics leader","800G/1.6T early adopter"],"weaknesses":["Primarily sells to hyperscalers/OEMs","Not direct to enterprise"]},{"name":"Coherent Corp","type":"Manufacturer","headquarters":"Saxonburg, USA","marketPosition":"Top-tier transceiver manufacturer (formerly II-VI/Finisar). Vertically integrated. Strong in coherent optics and telecom.","formFactorsOffered":["SFP+","SFP28","QSFP28","QSFP-DD","OSFP","CFP2-DCO","OSFP-XD"],"speedTiersOffered":["10G","25G","100G","400G","800G","1.6T"],"strengths":["Vertical integration","Coherent optics leadership","InP and SiPh capabilities"],"weaknesses":["Premium pricing","OEM/hyperscale focus"]},{"name":"Broadcom","type":"Manufacturer","headquarters":"San Jose, USA","marketPosition":"Major silicon + optics vendor. Tomahawk switch ASICs plus transceiver modules. Co-packaged optics initiative.","formFactorsOffered":["SFP+","SFP28","QSFP28","QSFP-DD","OSFP"],"speedTiersOffered":["10G","25G","100G","400G","800G"],"strengths":["Switch ASIC + optics synergy","Co-packaged optics leadership"],"weaknesses":["Premium pricing","Mostly hyperscale/OEM channel"]},{"name":"HPE/Aruba","type":"OEM","headquarters":"Houston, USA","marketPosition":"Strong in campus/enterprise networking. Aruba CX for modern campus. Juniper acquisition expanding portfolio.","formFactorsOffered":["SFP","SFP+","SFP28","QSFP+","QSFP28","QSFP-DD"],"speedTiersOffered":["1G","10G","25G","40G","100G","400G"],"strengths":["Campus/enterprise dominance","Aruba CX modern OS","Juniper integration expanding"],"weaknesses":["Optics premium","Less DC presence (pre-Juniper)"]},{"name":"Dell Technologies","type":"OEM","headquarters":"Round Rock, USA","marketPosition":"PowerSwitch for DC switching. Strong server attach rate driving optics demand.","formFactorsOffered":["SFP","SFP+","SFP28","QSFP+","QSFP28","QSFP-DD"],"speedTiersOffered":["1G","10G","25G","40G","100G","400G"],"strengths":["Server + switch bundle deals","OS10/FTOS flexibility","Open networking friendly"],"weaknesses":["Optics premium","Smaller networking market share"]},{"name":"Extreme Networks","type":"OEM","headquarters":"Morrisville, USA","marketPosition":"Consolidated multiple brands (Brocade, Avaya Networking, Enterasys, Aerohive). Strong in campus and education.","formFactorsOffered":["SFP","SFP+","SFP28","QSFP+","QSFP28"],"speedTiersOffered":["1G","10G","25G","40G","100G"],"strengths":["Campus/education market","Fabric Connect technology","Unified management"],"weaknesses":["Optics premium","Complex legacy product lines"]}]};
const T=DB.transceivers,S=DB.standards,C=DB.competitors;
let speedF=null,ffF=null;

function render(){
  const q=document.getElementById('q').value.toLowerCase();
  let r=T.filter(t=>{
    if(speedF&&t.speedGbps!==speedF)return false;
    if(ffF&&t.formFactor!==ffF)return false;
    if(!q)return true;
    const s=`${t.id} ${t.standard} ${t.formFactor} ${t.speed} ${t.reachLabel} ${t.fiberType} ${t.wavelengths} ${t.useCase} ${t.tags.join(' ')} ${t.vendors.join(' ')}`.toLowerCase();
    return q.split(/\s+/).every(w=>s.includes(w));
  });
  document.getElementById('count').textContent=`${r.length} of ${T.length} transceivers`;
  document.getElementById('results').innerHTML=r.map(t=>`
    <div class="card" onclick="this.querySelector('.card-detail').classList.toggle('open')">
      <div class="card-head"><span class="card-name">${t.standard}</span><span class="card-speed">${t.speed}</span></div>
      <div class="card-meta">
        <span>${t.formFactor}</span><span>${t.reachLabel}</span><span>${t.fiberType}</span>
        <span>${t.connector}</span><span>${t.wavelengths}</span>
      </div>
      <div class="card-detail">
        <p><strong>Use Case:</strong> ${t.useCase}</p>
        <p><strong>Power:</strong> ${t.powerConsumptionW}W &middot; <strong>Category:</strong> ${t.category} &middot; <strong>Price:</strong> ${t.priceTier}</p>
        ${t.ieeeReference?`<p><strong>IEEE:</strong> ${t.ieeeReference}</p>`:''}
        ${t.lanes?`<p><strong>Lanes:</strong> ${t.lanes} x ${t.laneRate||'N/A'} &middot; <strong>Modulation:</strong> ${t.modulation||'N/A'}</p>`:''}
        <p><strong>Vendors:</strong></p>
        <div class="vendor-tags">${t.vendors.map(v=>`<span class="vtag">${v}</span>`).join('')}</div>
      </div>
    </div>`).join('');
}

document.getElementById('q').addEventListener('input',render);
document.querySelectorAll('[data-speed]').forEach(b=>b.addEventListener('click',()=>{
  const v=+b.dataset.speed;speedF=speedF===v?null:v;
  document.querySelectorAll('[data-speed]').forEach(x=>x.classList.toggle('active',+x.dataset.speed===speedF));
  render();
}));
document.querySelectorAll('[data-ff]').forEach(b=>b.addEventListener('click',()=>{
  const v=b.dataset.ff;ffF=ffF===v?null:v;
  document.querySelectorAll('[data-ff]').forEach(x=>x.classList.toggle('active',x.dataset.ff===ffF));
  render();
}));

document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>{
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));t.classList.add('active');
  const p=t.dataset.tab;
  document.getElementById('search-panel').classList.toggle('hidden',p!=='search');
  document.getElementById('standards-panel').classList.toggle('hidden',p!=='standards');
  document.getElementById('competitors-panel').classList.toggle('hidden',p!=='competitors');
  if(p==='standards')renderStandards();
  if(p==='competitors')renderCompetitors();
}));

function renderStandards(){
  document.getElementById('standards-panel').innerHTML=`<table class="std-table"><thead><tr>
    <th>Standard</th><th>Speed</th><th>Lanes</th><th>Fiber</th><th>Reach</th><th>Connector</th><th>Year</th></tr></thead><tbody>`+
    S.map(s=>`<tr><td>${s.standard}<br><small style="color:#8b949e">${s.ieeeReference}</small></td>
      <td>${s.speed}</td><td>${s.lanes}x${s.laneRate}</td><td>${s.fiberType}</td>
      <td>${s.maxReachLabel}</td><td>${s.connector}</td><td>${s.yearRatified}</td></tr>`).join('')+
    `</tbody></table>`;
}

function renderCompetitors(){
  document.getElementById('competitors-panel').innerHTML=`<table class="comp-table"><thead><tr>
    <th>Company</th><th>Type</th><th>HQ</th><th>Position</th><th>Speeds</th><th>Strengths</th></tr></thead><tbody>`+
    C.map(c=>`<tr><td style="color:#58a6ff">${c.name}</td><td>${c.type}</td><td>${c.headquarters}</td>
      <td>${c.marketPosition}</td><td>${c.speedTiersOffered.join(', ')}</td>
      <td>${c.strengths.slice(0,2).join('; ')}</td></tr>`).join('')+
    `</tbody></table>`;
}

render();
</script>
